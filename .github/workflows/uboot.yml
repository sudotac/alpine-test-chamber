# SPDX-License-Identifier: CC0-1.0
name: Run unit test of U-Boot
on:
  pull_request:
    paths:
      - .github/workflows/uboot.yml
      - 'uboot/**'
  schedule:
    - cron: '30 18 * * 4'
  workflow_dispatch:

env:
  ALPINE_BRANCH: v3.24

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install U-Boot into chroot
        id: setup-alpine
        uses: jirutka/setup-alpine@ae3b3ddba35054804fc4a3507b519fa7e8152050 # v1.4.1
        with:
          arch: aarch64
          branch: ${{ env.ALPINE_BRANCH }}
          packages: >
            u-boot-qemu

      - name: Run test on QEMU
        shell: bash
        run: |
          echo ::group::Configure per architecture
          set -x
          case ${{ matrix.arch }} in
            aarch64)
              qemu_arch=arm
              machine=virt
              cpu=max
              uboot=${{ steps.setup-alpine.outputs.root-path }}/usr/share/u-boot/qemu_arm64/u-boot.bin
              ;;
          esac
          set +x
          echo ::endgroup::

          echo ::group::Install dependencies
          sudo apt-get update
          sudo apt-get install qemu-system-"$qemu_arch" expect
          echo ::endgroup::

          echo ::group::Run unit tests of U-Boot
          ./uboot/run.exp qemu-system-${{ matrix.arch }} \
            ${machine:+--machine "$machine"} \
            -cpu "$cpu" \
            -smp "$(nproc)" \
            -bios "$uboot" \
            -device virtio-rng-pci \
            -nographic \
            | tee uboot.log
          echo
          echo ::endgroup::
